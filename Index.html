<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Personal Diary 🌸</title>
<style>
    :root {
        --bg-color: #FFF0F5; /* Lavender Blush */
        --card-bg: #FFFFFF;
        --text-main: #5C4033; /* Dark Brown */
        --accent: #FFB6C1; /* Light Pink */
        --accent-hover: #FF69B4; /* Hot Pink */
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
    }
    .container {
        width: 100%;
        max-width: 600px;
        background: var(--card-bg);
        border-radius: 15px;
        box-shadow: 0 8px 16px rgba(255, 182, 193, 0.3);
        padding: 30px;
        text-align: center;
    }
    .hidden { display: none; }
    h1 { color: var(--accent-hover); }
    .illustrations { font-size: 3rem; margin: 10px 0; }
    button {
        background-color: var(--accent);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 25px;
        font-size: 16px;
        cursor: pointer;
        margin: 10px;
        transition: 0.3s;
    }
    button:hover { background-color: var(--accent-hover); }
    input, textarea, select {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 2px solid var(--accent);
        border-radius: 10px;
        box-sizing: border-box;
        font-family: inherit;
    }
    textarea { height: 200px; resize: vertical; }
    .entry-card {
        background: var(--bg-color);
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        text-align: left;
    }
    .entry-date { font-size: 0.8rem; color: gray; }
</style>
</head>
<body>

<div class="container">
    <!-- Home Page -->
    <div id="home-page">
        <h1>My Diary 💖</h1>
        <div class="illustrations">🧸 🎀 🌸 ✨</div>
        <p>Your safe space for memories, feelings, and important things.</p>
        <button onclick="showPage('write-page')">Write New Entry</button>
        <button onclick="showPage('entries-page'); loadEntries();">View Memories</button>
    </div>

    <!-- Write Page -->
    <div id="write-page" class="hidden">
        <h2>How was your day? 📝</h2>
        <input type="text" id="entry-title" placeholder="Give this memory a title...">
        <select id="entry-mood">
            <option value="😊 Happy">😊 Happy</option>
            <option value="😌 Calm">😌 Calm</option>
            <option value="😢 Sad">😢 Sad</option>
            <option value="😡 Angry">😡 Angry</option>
            <option value="✨ Excited">✨ Excited</option>
        </select>
        <textarea id="entry-content" placeholder="Dear Diary..."></textarea>
        <button onclick="saveEntry()">Save Memory</button>
        <button onclick="showPage('home-page')" style="background-color: #ccc;">Cancel</button>
    </div>

    <!-- Entries Page -->
    <div id="entries-page" class="hidden">
        <h2>Your Memories 📖</h2>
        <div id="entries-list"></div>
        <button onclick="showPage('home-page')">Back to Home</button>
    </div>
</div>

<script>
    function showPage(pageId) {
        document.getElementById('home-page').classList.add('hidden');
        document.getElementById('write-page').classList.add('hidden');
        document.getElementById('entries-page').classList.add('hidden');
        document.getElementById(pageId).classList.remove('hidden');
    }

    function saveEntry() {
        const title = document.getElementById('entry-title').value;
        const mood = document.getElementById('entry-mood').value;
        const content = document.getElementById('entry-content').value;
        const date = new Date().toLocaleString();

        if (!content) {
            alert('Please write something before saving!');
            return;
        }

        const entry = { title, mood, content, date };
        let entries = JSON.parse(localStorage.getItem('diaryEntries')) || [];
        entries.unshift(entry); // Add to beginning
        localStorage.setItem('diaryEntries', JSON.stringify(entries));

        // Clear fields
        document.getElementById('entry-title').value = '';
        document.getElementById('entry-content').value = '';
        document.getElementById('entry-mood').value = '😊 Happy';

        alert('Memory saved securely! 🌸');
        showPage('home-page');
    }

    function loadEntries() {
        const entriesList = document.getElementById('entries-list');
        const entries = JSON.parse(localStorage.getItem('diaryEntries')) || [];
        
        if (entries.length === 0) {
            entriesList.innerHTML = '<p>No memories saved yet. Start writing!</p>';
            return;
        }

        entriesList.innerHTML = entries.map(entry => `
            <div class="entry-card">
                <h3>${entry.title || 'Untitled Memory'} ${entry.mood}</h3>
                <p class="entry-date">${entry.date}</p>
                <p>${entry.content.replace(/\n/g, '<br>')}</p>
            </div>
        `).join('');
    }
</script>

</body>
</html>
